# Windmill Cloud flow blueprint.
#
# This is an implementation map for the Windmill UI. Windmill may export a
# richer generated YAML format after you build the flow in Cloud; when it does,
# keep the Windmill-generated export as the source of truth.

name: dentist_appointment_flow
summary: WhatsApp webhook -> extract appointment -> check calendar -> create event -> reply

webhook:
  provider: meta_whatsapp
  post_handler: f/dentist_appointment/extract_appointment.py
  verification_handler: f/dentist_appointment/verify_whatsapp_webhook.py

windmill_paths:
  extract_appointment: f/dentist_appointment/extract_appointment.py
  check_calendar_availability: f/dentist_appointment/check_calendar_availability.py
  create_calendar_event: f/dentist_appointment/create_calendar_event.py
  generate_reply: f/dentist_appointment/generate_reply.py
  send_whatsapp: f/dentist_appointment/send_whatsapp.py

resources:
  whatsapp: u/meta/whatsapp
  openai: u/openai/default
  google_calendar: u/google/calendar

variables:
  clinic_name: u/clinic/name
  clinic_timezone: u/clinic/timezone
  whatsapp_verify_token: u/meta/whatsapp_verify_token
  whatsapp_access_token: u/meta/whatsapp_access_token
  whatsapp_phone_number_id: u/meta/whatsapp_phone_number_id
  whatsapp_api_version: u/meta/whatsapp_api_version
  openai_api_key: u/openai/api_key
  openai_model: u/openai/model
  google_calendar_access_token: u/google/calendar_access_token
  google_calendar_id: u/google/calendar_id

steps:
  - id: extract_appointment
    path: f/dentist_appointment/extract_appointment.py
    args:
      payload: ${flow.input.payload}
      default_duration_minutes: 30
      clinic_timezone: ${var.u/clinic/timezone}

  - id: check_calendar_availability
    path: f/dentist_appointment/check_calendar_availability.py
    when: ${steps.extract_appointment.needs_clarification == false}
    args:
      appointment: ${steps.extract_appointment}
      google_calendar: ${res.u/google/calendar}
      calendar_id: ${var.u/google/calendar_id}

  - id: create_calendar_event
    path: f/dentist_appointment/create_calendar_event.py
    when: ${steps.check_calendar_availability.available == true}
    args:
      appointment: ${steps.check_calendar_availability}
      google_calendar: ${res.u/google/calendar}
      calendar_id: ${var.u/google/calendar_id}
      clinic_timezone: ${var.u/clinic/timezone}

  - id: generate_reply_booked_or_unavailable
    path: f/dentist_appointment/generate_reply.py
    when: ${steps.extract_appointment.needs_clarification == false}
    args:
      appointment: ${steps.create_calendar_event || steps.check_calendar_availability}
      clinic_name: ${var.u/clinic/name}
      openai: ${res.u/openai/default}

  - id: generate_reply_clarification
    path: f/dentist_appointment/generate_reply.py
    when: ${steps.extract_appointment.needs_clarification == true}
    args:
      appointment: ${steps.extract_appointment}
      clinic_name: ${var.u/clinic/name}
      openai: ${res.u/openai/default}

  - id: send_whatsapp
    path: f/dentist_appointment/send_whatsapp.py
    args:
      appointment: ${steps.generate_reply_booked_or_unavailable || steps.generate_reply_clarification}
      whatsapp: ${res.u/meta/whatsapp}
